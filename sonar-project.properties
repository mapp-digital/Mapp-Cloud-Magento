sonar.projectKey=mapp-digital_mapp-cloud-magento
sonar.projectName=Mapp Cloud Magento

# Source directories (PHP source only, no tests)
sonar.sources=Api,Block,Console,Controller,Cron,Enum,Framework,Helper,Logger,Model,Observer,Plugin,ViewModel,Setup,etc,view,registration.php

# Exclude test directories and generated/minified assets
sonar.exclusions=Test/**,**/*.min.js,**/node_modules/**

# No coverage reports
sonar.php.coverage.reportPaths=
sonar.coverage.exclusions=**/*

# Encoding
sonar.sourceEncoding=UTF-8
